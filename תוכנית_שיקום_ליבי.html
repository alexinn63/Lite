<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>טופס תוכנית שיקום</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0f1e3a;
      --navy2: #0a2646;
      --border: #e4e9f4;
      --bg: #f5f7fb;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #3d6f9e;
      --primary-dark: #2c5478;
      --gold: #c9a84c;
      --gold2: #e8c96a;
      --green: #16a66b;
      --red: #bf5c64;
      --blue-light: #eef4fc;
      --white: #ffffff;
      --shadow: 0 1px 3px rgba(15,30,80,.06), 0 10px 28px rgba(15,30,80,.10);
      --shadow-lg: 0 8px 24px rgba(15,30,80,.14), 0 24px 56px rgba(15,30,80,.14);
      --radius: 20px;
      --radius-sm: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Heebo', 'Arial Hebrew', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 920px;
      margin: 18px auto;
      padding: 0 0 22px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 26px;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .page > *:not(.top-bar) { margin-left: 20px; margin-right: 20px; }

    h1, h2, h3 { margin: 0 0 14px; }

    /* TOP BAR */
    .top-bar{
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
      color:white;
      padding:16px 24px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      box-shadow:0 4px 20px rgba(0,0,0,0.22);
    }

    .top-bar .subtitle{
      font-size:12px;
      color:#a8c4e0;
      margin-top:2px;
    }

    .logo{
      height:44px;
      width:auto;
      display:block;
    }

    h1 { text-align: center; font-size: 28px; font-weight: 800; letter-spacing: -.3px; }
    h2 {
      font-size: 18px;
      font-weight: 800;
      margin-top: 26px;
      padding: 0 0 0 12px;
      border-bottom: none;
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    h2::before {
      content: '';
      width: 5px;
      height: 20px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--gold), var(--gold2));
      flex-shrink: 0;
    }

    label {
      font-weight: 600;
      font-size: 12.5px;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    input, select, textarea, button {
      font-family: inherit;
      font-size: 15px;
    }

    input, select, textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      background: white;
      transition: border-color .18s, box-shadow .18s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(201,168,76,.16);
    }

    textarea { min-height: 76px; resize: none; overflow: hidden; }

    .grid {
      display: grid;
      grid-template-columns: 2fr 0.8fr 0.8fr 1.6fr;
      gap: 14px;
      margin: 14px 0;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .full { grid-column: 1 / -1; }

    .goal-section {
      display: block;
      background: linear-gradient(160deg,#ffffff 0%,#f8fafc 100%);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px 20px;
      margin: 18px 0;
      box-shadow: var(--shadow);
    }
    .goal-section .goalNumber {
      margin: 0;
      font-size: 16px;
      white-space: nowrap;
    }
    .goal-section .goalNumber::before { height: 18px; }
    .goal-section table { margin-top: 12px; }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-top: 14px;
      table-layout: auto;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1.5px solid var(--border);
    }

    th, td {
      border: none;
      border-bottom: 1px solid var(--border);
      border-left: 1px solid var(--border);
      padding: 10px;
      vertical-align: top;
    }
    th:last-child, td:last-child { border-left: none; }
    tbody tr:last-child td { border-bottom: none; }

    th {
      background: linear-gradient(180deg,#f6f9ff,#eef3fb);
      text-align: center;
      font-size: 12.5px;
      font-weight: 700;
      color: var(--primary-dark);
      border-bottom: 1.5px solid var(--border);
    }

    .goal-title {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 8px;
    }

    .goal-title input { max-width: 75%; }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 8px 0;
    }

    button {
      border: 0;
      border-radius: var(--radius-sm);
      padding: 8px 16px;
      cursor: pointer;
      background: linear-gradient(180deg,#5a86ac,var(--primary));
      color: white;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 12px rgba(61,111,158,.22);
      transition: all .2s cubic-bezier(.34,1.3,.64,1);
    }

    button:hover { transform: translateY(-2px); box-shadow: 0 8px 18px rgba(61,111,158,.28); }
    button.secondary { background: linear-gradient(180deg,#5a86ac,var(--primary)); }
    button.danger { background: linear-gradient(180deg,#d18a8f,var(--red)); box-shadow: 0 4px 12px rgba(191,92,100,.22); }
    button.danger:hover { box-shadow: 0 8px 18px rgba(191,92,100,.28); }
    button.print-btn { background: var(--white); color: var(--primary-dark); border: 1.5px solid var(--border); box-shadow: var(--shadow); }
    button.print-btn:hover { background: var(--blue-light); box-shadow: var(--shadow); }
    button.pdf-btn { background: linear-gradient(180deg,var(--gold2),var(--gold)); color: #4a3600; box-shadow: 0 6px 16px rgba(201,168,76,.36); }
    button.pdf-btn:hover { box-shadow: 0 10px 22px rgba(201,168,76,.44); }
    .actions-main {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .actions-left, .actions-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .muted { color: var(--muted); font-size: 13px; }
    .readonly-box {
      border: 1.5px solid var(--border);
      background: #f8fafc;
      border-radius: var(--radius-sm);
      padding: 14px;
      min-height: 44px;
    }

    .partners-box {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 10px;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      padding: 10px 16px;
      background: #fff;
      transition: border-color .18s, background .18s;
    }
    .check-row:has(input:checked) {
      border-color: var(--gold);
      background: linear-gradient(180deg,#fffdf6,#fdf6e3);
    }

    .check-row input { width: auto; }

    .print-header {
      display: none;
      text-align: center;
      margin-bottom: 20px;
    }

    .signature-line {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: end;
    }

    .line {
      border-top: 1px solid #333;
      width: 100%;
      margin-bottom: 2px;
    }

    @media (max-width: 800px) {
      .grid, .grid-2, .partners-box, .signature-line {
        grid-template-columns: 1fr;
      }
      .goal-title { flex-direction: column; align-items: stretch; }
      .goal-title input { max-width: 100%; }
      table { font-size: 13px; }
    }

    @media print {
      @page {
        size: A4 landscape;
        margin: 10mm;
      }
      body { background: white; }
      .page { box-shadow: none; border: 0; margin: 0; max-width: none; }
      .actions, .no-print, button, datalist { display: none !important; }
      .print-header { display: block; }
      input, select, textarea {
        border: 0;
        padding: 0;
        background: transparent;
        appearance: none;
      }
      textarea { height: auto; overflow: visible; }
      th { background: #eee !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  
    @media print {
      textarea { display: none !important; }
      .print-textarea-proxy { display: block !important; }
    }


/* שמירה/PDF/הדפסה: לשמור על אותה פריסה כמו במסך */
@media print {
  .grid {
    display: grid !important;
    grid-template-columns: 2fr 0.8fr 0.8fr 1.6fr !important;
    gap: 14px !important;
  }

  .partners-box {
    display: grid !important;
    grid-template-columns: repeat(3, 1fr) !important;
    gap: 12px !important;
  }

  .grid-2 {
    display: grid !important;
    grid-template-columns: 1fr 1fr !important;
    gap: 14px !important;
  }
}


/* שורה ראשונה: כל תא במסגרת, תאריך מתחת לכותרת */
.grid > div {
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  background: #fff;
  box-shadow: var(--shadow);
}

.grid > div label {
  display: block;
  margin-bottom: 6px;
  text-align: right;
}

.grid > div input,
.grid > div select {
  display: block;
  width: 100%;
  text-align: right;
  direction: rtl;
}

.grid > div input[type="date"] {
  text-align: center;
  direction: ltr;
}

/* הדפסה/PDF: לשמור תאריך בדיוק בתוך התא */
@media print {
  .grid > div {
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    padding: 8px !important;
    background: #fff !important;
    break-inside: avoid !important;
  }

  .grid > div label {
    display: block !important;
    margin-bottom: 6px !important;
    text-align: right !important;
  }

  .grid > div input,
  .grid > div select {
    display: block !important;
    width: 100% !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    padding: 7px 8px !important;
    background: white !important;
    box-sizing: border-box !important;
  }

  .grid > div input[type="date"] {
    text-align: center !important;
    direction: ltr !important;
  }
}


/* שותף נוסף - מסגרות כמו שורת התאריכים */
.grid-2 > div {
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  background: #fff;
  box-shadow: var(--shadow);
}

.grid-2 > div label {
  display: block;
  margin-bottom: 6px;
  text-align: right;
}

.grid-2 > div input {
  width: 100%;
  text-align: right;
  direction: rtl;
}

/* הדפסה/PDF */
@media print {
  .grid-2 > div {
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    padding: 8px !important;
    background: #fff !important;
  }

  .grid-2 > div input {
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    padding: 7px 8px !important;
    background: white !important;
    width: 100% !important;
    box-sizing: border-box !important;
  }
}


/* יעד textarea - לראות הכל גם בהדפסה */
.target {
  min-height: 56px;
  resize: none;
  overflow: hidden;
  white-space: pre-wrap;
}


.excel-top-loader {
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:8px;
  direction:rtl;
}

.excel-top-loader label {
  color:#ffffff;
  font-size:12px;
  font-weight:500;
  margin:0;
}

.excel-top-loader input[type="file"] {
  width:auto;
  max-width:220px;
  font-size:12px;
  padding:4px;
  background:#ffffff;
  border-radius:6px;
}

.excel-status {
  font-size:12px;
  color:#a8c4e0;
}


/* כפתור EXCEL */
.excel-upload-side{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:4px;
}

.excel-button{
  background:linear-gradient(180deg,#33c481,#107c41);
  color:white;
  padding:10px 18px;
  border-radius:var(--radius-sm);
  cursor:pointer;
  font-weight:700;
  font-size:15px;
  display:inline-flex;
  align-items:center;
  gap:8px;
  box-shadow:0 6px 16px rgba(16,124,65,.32);
  transition:.2s cubic-bezier(.34,1.3,.64,1);
}

.excel-button:hover{
  background:linear-gradient(180deg,#3ed890,#0f6f3d);
  transform: translateY(-2px);
}

.excel-status{
  color:#cfe8d7;
  font-size:12px;
}


/* כל הכפתורים באותו גודל */
button,
.excel-button {
  min-height: 42px !important;
  padding: 8px 16px !important;
  font-size: 15px !important;
  line-height: 1 !important;
  border-radius: var(--radius-sm) !important;
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
  box-sizing: border-box !important;
}


/* יישור כפתורי מחיקה לאותו קו */
.goal-title {
  display: grid !important;
  grid-template-columns: auto 1fr auto !important;
  align-items: end !important;
  gap: 10px !important;
}

.goal-title .danger {
  align-self: end !important;
  min-width: 116px !important;
}

.actions.no-print {
  align-items: center !important;
}

.actions.no-print .danger,
.pdf-btn {
  min-width: 116px !important;
}


/* עיצוב כפתורים לפי בקשה */
.btn-plus {
  color: #ffffff !important;
  font-size: 18px !important;
  font-weight: 500 !important;
  line-height: 1 !important;
}

.clear-btn {
  background: transparent !important;
  color: var(--red) !important;
  border: 1.5px solid var(--red) !important;
  min-width: 116px !important;
  box-shadow: none !important;
}

.clear-btn:hover {
  background: rgba(214, 69, 80, 0.08) !important;
  transform: none !important;
}

.delete-row-btn,
.delete-goal-btn {
  color: #ffffff !important;
  min-width: 116px !important;
  height: 42px !important;
  padding: 8px 16px !important;
  font-size: 15px !important;
  border-radius: var(--radius-sm) !important;
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
  gap: 6px !important;
  box-sizing: border-box !important;
  border: 0 !important;
  box-shadow: 0 4px 12px rgba(191,92,100,.22) !important;
}

.delete-row-btn {
  background: linear-gradient(180deg,#d18a8f,var(--red)) !important;
}

.delete-row-btn:hover {
  box-shadow: 0 8px 18px rgba(191,92,100,.28) !important;
}

.delete-goal-btn {
  background: linear-gradient(180deg,#d18a8f,#a8535b) !important;
}

.delete-goal-btn:hover {
  box-shadow: 0 8px 18px rgba(191,92,100,.28) !important;
}


/* כפתור שמירה כ-HTML */
.html-btn {
  background: linear-gradient(135deg, var(--primary-dark), var(--navy)) !important;
  color: #ffffff !important;
  min-width: 116px !important;
  box-shadow: 0 6px 16px rgba(15,30,58,.32) !important;
}

.html-btn:hover {
  box-shadow: 0 10px 22px rgba(15,30,58,.4) !important;
}


/* כפתור קובץ כספי — אייקון בלבד */
.finance-icon-btn {
  width: 48px !important;
  min-width: 48px !important;
  height: 42px !important;
  padding: 5px !important;
  border-radius: 12px !important;
  border: 1px solid #9bc7f2 !important;
  background: linear-gradient(145deg, #ffffff 0%, #eef6ff 100%) !important;
  box-shadow: 0 4px 10px rgba(37,99,168,.16), inset 0 1px 0 rgba(255,255,255,.9) !important;
  overflow: hidden;
  position: relative;
}
.finance-icon-btn img {
  width: 34px;
  height: 34px;
  object-fit: contain;
  display: block;
  transition: transform .22s ease, filter .22s ease;
}
.finance-icon-btn::after {
  content: "";
  position: absolute;
  inset: -40%;
  background: linear-gradient(115deg, transparent 35%, rgba(255,255,255,.78) 50%, transparent 65%);
  transform: translateX(-130%) rotate(8deg);
  transition: transform .55s ease;
  pointer-events: none;
}
.finance-icon-btn:hover {
  background: linear-gradient(145deg, #f7fbff 0%, #dceeff 100%) !important;
  border-color: #5ea6e8 !important;
  box-shadow: 0 7px 16px rgba(37,99,168,.24), inset 0 1px 0 rgba(255,255,255,.95) !important;
  transform: translateY(-2px);
}
.finance-icon-btn:hover img { transform: scale(1.08) rotate(-2deg); filter: saturate(1.08); }
.finance-icon-btn:hover::after { transform: translateX(130%) rotate(8deg); }
.finance-icon-btn:active { transform: translateY(0) scale(.97); }
.finance-icon-btn:focus-visible { outline: 3px solid rgba(37,99,168,.28); outline-offset: 2px; }
@media (prefers-reduced-motion: reduce) {
  .finance-icon-btn, .finance-icon-btn img, .finance-icon-btn::after { transition: none !important; }
}
@media print { .finance-icon-btn, #financeFileInput { display:none !important; } }


/* חלון חתימה מוגדל */
.signature-pad-wrap{position:relative}.signature-pad-hint{font-size:12px;color:var(--muted);margin-top:2px}.signature-pad-wrap.signature-expanded{position:fixed;inset:0;z-index:10000;background:rgba(15,23,42,.78);display:flex!important;align-items:center;justify-content:center;padding:20px}.signature-pad-wrap.signature-expanded .signature-dialog{width:min(960px,96vw);background:#fff;border-radius:16px;padding:18px;box-shadow:0 24px 70px rgba(0,0,0,.35)}.signature-dialog-header{display:none;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.signature-pad-wrap.signature-expanded .signature-dialog-header{display:flex}.signature-dialog-title{font-size:20px;font-weight:500;color:var(--primary-dark)}.signature-close-btn{background:#fff!important;color:var(--primary-dark)!important;border:1px solid var(--border)!important;min-width:96px!important}.signature-pad-wrap.signature-expanded #signatureCanvas{width:100%!important;height:min(52vh,420px)!important;max-width:none!important;border-width:2px!important;box-shadow:inset 0 0 0 1px rgba(37,99,168,.08)}.signature-pad-wrap.signature-expanded .signature-pad-hint{display:none}body.signature-modal-open{overflow:hidden}@media(max-width:600px){.signature-pad-wrap.signature-expanded{padding:8px}.signature-pad-wrap.signature-expanded .signature-dialog{padding:12px;border-radius:12px}.signature-pad-wrap.signature-expanded #signatureCanvas{height:58vh!important}}@media print{.signature-pad-wrap.signature-expanded{position:static!important;display:block!important;background:transparent!important;padding:0!important}.signature-dialog-header,.signature-pad-hint{display:none!important}}

/* השורה הפעילה למחיקה */
.goal-section tbody tr {
  transition: background-color .16s ease, box-shadow .16s ease;
}
.goal-section tbody tr.selected-row td {
  background: #eef6ff;
  box-shadow: inset 0 0 0 2px rgba(37, 99, 168, .35);
}
@media print {
  .goal-section tbody tr.selected-row td {
    background: transparent !important;
    box-shadow: none !important;
  }
}


/* טיפוגרפיה עדינה יותר — ללא אותיות עבות */
body, input, select, textarea, button, label, .readonly-box, .subtitle, th, td {
  font-weight: 400 !important;
}
h1, h2, h3, .goalNumber, .signature-dialog-title, .top-bar [style*="font-weight"] {
  font-weight: 500 !important;
}
button, .excel-button {
  font-weight: 500 !important;
}

</style>
</head>
<body>
  <div class="page">
    
<div class="top-bar">

  <div class="excel-upload-side no-print">
    <div class="excel-button" style="cursor:default;box-shadow:none;">
      📋 נתונים מהמסך הראשי
    </div>
    <div id="excelStatus" class="excel-status">בודק נתונים...</div>
  </div>

  <div>

        <div style="display:flex;align-items:center;gap:14px;">
          <div style="font-size:17px;font-weight:500;color:white;">
            תוכנית שיקום למקבל שירות
          </div>
          <img class="logo" data-logo="org" src="" style="height:50px;width:auto;object-fit:contain;" alt="יחדיו">
        </div>

        <div class="subtitle">
          משרד הבריאות - מפעל מוגן שיקומי לבריאות הנפש באר שבע
        </div>

        <div class="subtitle">
          שאול המלך 113, באר שבע
        </div>

        
      </div>
    </div>

    <div class="grid">
      <div>
        <label for="clientName">שם מקבל השירות</label>
        <input id="clientName" list="clientsList" placeholder="" />
        <datalist id="clientsList"></datalist>
      </div>
      <div>
        <label for="planDate">תאריך</label>
        <input id="planDate" type="date" />
      </div>

      <div>
        <label for="followDate">תאריך מעקב</label>
        <input id="followDate" type="date" />
      </div>

      <div>

              צבע:
              <select id="signatureColor" onchange="updateSignatureColor()" style="width:auto;padding:3px 6px;font-size:12px;border-radius:6px;border:1px solid #b8d0ee;">

  <datalist id="targetsMemory"></datalist>

  <script>
    const STORAGE_KEYS = {
      targets: 'rehabTargetsMemory_v1',
      clients: 'rehabClientsMemory_v1',
      form: 'rehabLastForm_v1'
    };

    const socialWorker = 'ליבי יוסופוב (עו"ס המפעל)';

    function todayISO() {
      const d = new Date();
      const offset = d.getTimezoneOffset();
      const local = new Date(d.getTime() - offset * 60000);
      return local.toISOString().slice(0, 10);
    }

    function getArray(key) {
      try { return JSON.parse(localStorage.getItem(key)) || []; }
      catch { return []; }
    }

    function setArray(key, value) {
      localStorage.setItem(key, JSON.stringify([...new Set(value.filter(Boolean))]));
    }

    function refreshDatalists() {
      const targets = getArray(STORAGE_KEYS.targets);
      const clients = getArray(STORAGE_KEYS.clients);
      document.getElementById('targetsMemory').innerHTML = targets.map(x => `<option value="${escapeHtml(x)}"></option>`).join('');
      document.getElementById('clientsList').innerHTML = clients.map(x => `<option value="${escapeHtml(x)}"></option>`).join('');
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    }

    function saveTarget(value) {
      const clean = value.trim();
      if (!clean) return;
      const targets = getArray(STORAGE_KEYS.targets);
      if (!targets.includes(clean)) {
        targets.unshift(clean);
        setArray(STORAGE_KEYS.targets, targets.slice(0, 100));
        refreshDatalists();
      }
    }

    let goalCounter = 0;

    function addGoalSection(data = null) {
      goalCounter = document.querySelectorAll('.goal-section').length + 1;
      const container = document.getElementById('goalsContainer');
      const section = document.createElement('section');
      section.className = 'goal-section';
      section.dataset.goalId = goalCounter;
      section.innerHTML = `
        <div class="goal-title">
          <h2 class="goalNumber">מטרה ${goalCounter}</h2>
          <input class="goalName" placeholder="לדוגמה: איזון מצב נפשי-רגשי" value="${escapeHtml(data?.name || '')}" />
          <button class="delete-goal-btn no-print" type="button" onclick="deleteGoalSection(this)">מחק מטרה</button>
        </div>
        <table>
          <thead>
            <tr>
              <th style="width:18%;">יעד</th>
              <th style="width:34%;">כלים להשגת היעד</th>
              <th style="width:18%;">שותפים וכיצד יוכלו<br>לסייע לי</th>
              <th style="width:30%;">איך אדע שהצלחתי?</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <div class="actions no-print"
             style="display:flex;justify-content:space-between;align-items:center;">

          <button
            type="button"
            onclick="addRow(this)">
            <span class="btn-plus">＋</span> הוסף שורה
          </button>

          <button
            type="button"
            class="delete-row-btn"
            onclick="deleteSelectedRow(this)">
            🗑️ מחק שורה
          </button>

        </div>
      `;
      container.appendChild(section);

      const rows = data?.rows?.length ? data.rows : [];
      rows.forEach(row => addRow(section.querySelector('button'), row));
    }

    function addRow(buttonOrSection, data = {}) {
      const section = buttonOrSection.closest ? buttonOrSection.closest('section') : buttonOrSection;
      const tbody = section.querySelector('tbody');
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>
          <textarea class="target" placeholder="" onblur="saveTarget(this.value)">${escapeHtml(data.target || '')}</textarea>
        </td>
        <td><textarea class="tools" placeholder="">${escapeHtml(data.tools || '')}</textarea></td>
        <td><textarea class="partnersHelp" placeholder="">${escapeHtml(data.partnersHelp || defaultPartnersText())}</textarea></td>
        <td><textarea class="success" placeholder="">${escapeHtml(data.success || '')}</textarea></td>
      `;
      tbody.appendChild(tr);
      selectGoalRow(tr);
      // פתיחה מיידית וגם לאחר חישוב מחדש של רוחב הטבלה
      tr.querySelectorAll('textarea').forEach(autoResize);
      scheduleAutoResize();
    }

    function defaultPartnersText() {
      return '';
    }

    function renumberGoals() {
      document.querySelectorAll('.goal-section').forEach((section, index) => {
        section.dataset.goalId = index + 1;
        const title = section.querySelector('.goalNumber');
        if (title) title.textContent = `מטרה ${index + 1}`;
      });
      goalCounter = document.querySelectorAll('.goal-section').length;
    }

    function deleteGoalSection(button) {
      button.closest('section').remove();
      renumberGoals();
    }


    function setFollowDatePlusSixMonths() {
      const plan = document.getElementById('planDate');
      const follow = document.getElementById('followDate');
      if (!plan || !follow || !plan.value) return;

      const [year, month, day] = plan.value.split('-').map(Number);
      const d = new Date(year, month - 1, day);
      const originalDay = d.getDate();
      d.setMonth(d.getMonth() + 6);
      if (d.getDate() !== originalDay) d.setDate(0);

      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      follow.value = `${yyyy}-${mm}-${dd}`;
    }

    function updateWrittenWith() {
      const client = document.getElementById('clientName').value.trim();
      const guide = document.getElementById('workshopGuide').value.trim();
      const parts = [socialWorker];
      if (client) parts.push(`${client} (מקבל השירות)`);
      if (guide) parts.push(`${guide} (מדריך הסדנה)`);

      document.getElementById('writtenWith').textContent = parts.join(', ') + '.';
      document.getElementById('signature').value = client || document.getElementById('signature').value;
    }

    function printForm() {
      updateWrittenWith();
      document.querySelectorAll('.target').forEach(el => saveTarget(el.value));
      saveClientNameNoAlert();
      window.print();
    }

    function printPdf() {
      updateWrittenWith();
      document.querySelectorAll('.target').forEach(el => saveTarget(el.value));
      saveClientNameNoAlert();
      alert('בחלון ההדפסה יש לבחור: שמירה כ-PDF / Save as PDF');
      window.print();
    }

    function saveClientNameNoAlert() {
      const name = document.getElementById('clientName').value.trim();
      if (!name) return;
      const clients = getArray(STORAGE_KEYS.clients);
      if (!clients.includes(name)) {
        clients.unshift(name);
        setArray(STORAGE_KEYS.clients, clients.slice(0, 200));
      }
      refreshDatalists();
    }

    function clearForm() {
      if (!confirm('לנקות את הטופס? רשימות היעדים והלקוחות השמורות לא יימחקו.')) return;
      applyForm({
      planDate: todayISO(),
      goals: [
        { name: '', rows: [{}] },
        { name: '', rows: [{}] }
      ]
    });
    }

    function applyForm(data) {
      if (!data) return;
      document.getElementById('clientName').value = data.clientName || '';
      document.getElementById('planDate').value = data.planDate || todayISO();
      setFollowDatePlusSixMonths();
      document.getElementById('workshopGuide').value = data.workshopGuide || '';
      document.getElementById('partnerClient').checked = data.partnerClient ?? true;
      document.getElementById('partnerGuide').checked = data.partnerGuide ?? true;
      document.getElementById('partnerManager').checked = data.partnerManager ?? false;
      document.getElementById('extraPartner1').value = data.extraPartner1 || '';
      document.getElementById('extraPartner2').value = data.extraPartner2 || '';
      document.getElementById('signature').value = data.signature || data.clientName || '';

      document.getElementById('goalsContainer').innerHTML = '';
      goalCounter = 0;
      (data.goals?.length ? data.goals : null)?.forEach(goal => addGoalSection(goal));
      if (!data.goals?.length) addGoalSection({ name: 'איזון מצב נפשי-רגשי', rows: [{}] });
      updateWrittenWith();
      // פתיחת כל שדות הטקסט לאחר טעינת הנתונים והפריסה
      scheduleAutoResize();
    }

    ['clientName','workshopGuide','extraPartner1','extraPartner2','partnerClient','partnerGuide','partnerManager'].forEach(id => {
      document.addEventListener('input', e => { if (e.target.id === id) updateWrittenWith(); });
      document.addEventListener('change', e => { if (e.target.id === id) updateWrittenWith(); });
    });

    window.addEventListener('beforeprint', () => {
      updateWrittenWith();
      document.querySelectorAll('.target').forEach(el => saveTarget(el.value));
    });

    refreshDatalists();
    applyForm({
      planDate: todayISO(),
      goals: [
        { name: '', rows: [{}] },
        { name: '', rows: [{}] }
      ]
    });
  
document.getElementById('planDate').addEventListener('change', function () {
    const follow = document.getElementById('followDate');
    if (!this.value) {
        if (follow) follow.value = '';
        updateDocumentTitleForPdf();
        return;
    }
    setFollowDatePlusSixMonths();
    updateDocumentTitleForPdf();
});



function selectGoalRow(row) {
    if (!row) return;
    const tbody = row.closest('tbody');
    if (!tbody) return;
    tbody.querySelectorAll('tr.selected-row').forEach(r => r.classList.remove('selected-row'));
    row.classList.add('selected-row');
}

function deleteSelectedRow(button) {
    const section = button.closest('section');
    const tbody = section.querySelector('tbody');
    const rows = Array.from(tbody.querySelectorAll('tr'));

    if (!rows.length) return;

    const selected = tbody.querySelector('tr.selected-row');
    const rowToDelete = selected || rows[rows.length - 1];
    const nextRow = rowToDelete.nextElementSibling || rowToDelete.previousElementSibling;

    rowToDelete.remove();
    if (nextRow) selectGoalRow(nextRow);
}

// לחיצה או מעבר לשדה מסמנים את השורה שאותה כפתור המחיקה ימחק
document.addEventListener('focusin', function (event) {
    const row = event.target.closest('.goal-section tbody tr');
    if (row) selectGoalRow(row);
});

document.addEventListener('pointerdown', function (event) {
    const row = event.target.closest('.goal-section tbody tr');
    if (row) selectGoalRow(row);
});


// ── Auto-resize textareas in real time ─────────────────────────────
function autoResize(el) {
    if (!el || el.tagName !== 'TEXTAREA') return;
    el.style.height = '0px';
    var minH = el.classList.contains('target') ? 56 : 76;
    el.style.height = Math.max(el.scrollHeight, minH) + 'px';
}

function autoResizeAll() {
    document.querySelectorAll('textarea').forEach(autoResize);
}

function scheduleAutoResize() {

// ── AB update guard before saving HTML ─────────────────────────────
function formatDateForExcelAB(isoDate) {
    if (!isoDate) return '';
    var parts = String(isoDate).split('-');
    if (parts.length === 3) return parts[2] + '/' + parts[1] + '/' + parts[0];
    return isoDate;
}

async function copyTextToClipboardSafe(text) {
    try {
        if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
            return true;
        }
    } catch (e) {}

    try {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', '');
        ta.style.position = 'fixed';
        ta.style.top = '-1000px';
        ta.style.right = '-1000px';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        var ok = document.execCommand('copy');
        document.body.removeChild(ta);
        return ok;
    } catch (e) {
        return false;
    }
}

    if (!clientName || !dateForExcel) return true;

    var copied = await copyTextToClipboardSafe(dateForExcel);
    var msg =
        clientName + ' | ' + dateForExcel + '\n\n' +
        (copied
            ? 'תאריך התוכנית הועתק.\n\n'
            : 'יש להעתיק ידנית את התאריך.\n\n') +
        'יש להדביק ב-Excel עמודה AB\n' +
        'ולחץ המשך.';

    return confirm(msg);
}

    // ── WACOM Signature Pad ────────────────────────────────────────────
    (function () {
        var canvas  = document.getElementById('signatureCanvas');
        if (!canvas) return;
        var ctx     = canvas.getContext('2d');
        var drawing = false;
        var inkColor = '#1a1aee'; // default blue
        // Точки штриха хранятся как есть (без обрезки по границам холста —
        // WACOM без экрана не даёт видеть границы). После каждого отпускания
        // пера весь рисунок пересчитывается и масштабируется (только уменьшение),
        // чтобы поместиться в квадрат подписи.
        var SIG_PADDING_RATIO = 0.08;
        var sigStrokes = [];
        var currentStroke = null;
        var restoredImage = null; // используется, если подпись восстановлена из сохранённого файла (нет точек)
        var padWrap = document.getElementById('signaturePadWrap');

        window.openSignatureModal = function() {
            if (!padWrap || padWrap.classList.contains('signature-expanded')) return;
            padWrap.classList.add('signature-expanded');
            document.body.classList.add('signature-modal-open');
        };
        window.closeSignatureModal = function() {
            if (!padWrap) return;
            padWrap.classList.remove('signature-expanded');
            document.body.classList.remove('signature-modal-open');
            renderSig();
        };
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && padWrap && padWrap.classList.contains('signature-expanded')) closeSignatureModal();
        });

        window.updateSignatureColor = function() {
            inkColor = document.getElementById('signatureColor').value;
            renderSig();
        };

        function getPos(e) {
            var rect = canvas.getBoundingClientRect();
            var scaleX = canvas.width  / rect.width;
            var scaleY = canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top)  * scaleY
            };
        }

        function renderSig() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (restoredImage) { ctx.drawImage(restoredImage, 0, 0, canvas.width, canvas.height); return; }
            if (!sigStrokes.length) return;

            var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            sigStrokes.forEach(function(stroke) {
                stroke.forEach(function(p) {
                    if (p.x < minX) minX = p.x;
                    if (p.y < minY) minY = p.y;
                    if (p.x > maxX) maxX = p.x;
                    if (p.y > maxY) maxY = p.y;
                });
            });

            var padX = canvas.width * SIG_PADDING_RATIO;
            var padY = canvas.height * SIG_PADDING_RATIO;
            var availW = canvas.width - 2 * padX;
            var availH = canvas.height - 2 * padY;
            var sigW = Math.max(maxX - minX, 1);
            var sigH = Math.max(maxY - minY, 1);
            var scale = Math.min(1, availW / sigW, availH / sigH);

            var drawnW = sigW * scale;
            var drawnH = sigH * scale;
            var offsetX = (canvas.width - drawnW) / 2 - minX * scale;
            var offsetY = (canvas.height - drawnH) / 2 - minY * scale;

            ctx.strokeStyle = inkColor; ctx.fillStyle = inkColor; ctx.lineWidth = 1.8; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            sigStrokes.forEach(function(stroke) {
                if (stroke.length < 2) {
                    if (stroke.length === 1) {
                        var p = stroke[0];
                        ctx.beginPath();
                        ctx.arc(p.x * scale + offsetX, p.y * scale + offsetY, ctx.lineWidth / 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    return;
                }
                ctx.beginPath();
                ctx.moveTo(stroke[0].x * scale + offsetX, stroke[0].y * scale + offsetY);
                for (var k = 1; k < stroke.length; k++) {
                    ctx.lineTo(stroke[k].x * scale + offsetX, stroke[k].y * scale + offsetY);
                }
                ctx.stroke();
            });
        }

        // pointerdown — start stroke, capture pointer so WACOM doesn't lose focus
        canvas.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            if (padWrap && !padWrap.classList.contains('signature-expanded')) { openSignatureModal(); return; }
            canvas.setPointerCapture(e.pointerId);
            drawing = true;
            restoredImage = null;
            currentStroke = [getPos(e)];
            sigStrokes.push(currentStroke);
            renderSig();
            formIsDirty = true;
        });

        // pointermove — точка добавляется в текущий штрих, весь рисунок перерисовывается с пересчётом масштаба
        canvas.addEventListener('pointermove', function(e) {
            if (!drawing || !currentStroke) return;
            e.preventDefault();
            currentStroke.push(getPos(e));
            renderSig();
        });

        // Важно: НЕТ обработчика pointerleave — перо может уйти за пределы холста,
        // штрих не обрывается (setPointerCapture продолжает доставлять события).
        canvas.addEventListener('pointerup',     function(e) { drawing = false; currentStroke = null; renderSig(); });
        canvas.addEventListener('pointercancel', function(e) { drawing = false; currentStroke = null; renderSig(); });

        // clear button
        window.clearSignatureCanvas = function() {
            sigStrokes = [];
            currentStroke = null;
            restoredImage = null;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        };

        // save canvas → data URL into collectFormData
        var _origCollect = collectFormData;
        collectFormData = function() {
            var d = _origCollect();

        applyForm = function(data) {
            _origApply(data);
            if (data && data.signatureImage && data.signatureImage !== 'data:,') {

                var img = new Image();
                img.onload = function() {
                    restoredImage = img;
                    renderSig();
                };
                img.src = data.signatureImage;
            }
        };
        // Fallback: if applyForm was called before WACOM IIFE ran, restore now
        setTimeout(function() {
            var stored = window._pendingSignatureImage;
            if (stored && stored !== 'data:,') {
                var img = new Image();
                img.onload = function() {
                    restoredImage = img;
                    renderSig();
                };
                img.src = stored;
                window._pendingSignatureImage = null;
            }
        }, 80);
    })();

    // ── Dirty flag & beforeunload warning ──────────────────────────────
    var formIsDirty = false;

    function collectFormData() {
        return {
            clientName:    document.getElementById('clientName')?.value    || '',
            planDate:      document.getElementById('planDate')?.value      || '',
            followDate:    document.getElementById('followDate')?.value    || '',

    document.addEventListener('input',  function() { formIsDirty = true; });

    title: "עובדת סוציאלית"
  },

  // ── מדריכים (רשימות נפתחות) ──────────────────────
  guides: [
    "אריסטרך קפוסטה",
    "שלום מימון",
    "אנדרי אברמוביץ",
    "רוזט פירוזה"
  ],

  // ── כל הצוות (לתיעוד שיחות וכד') ────────────────
  allStaff: [
    "אלכסנדר חטקביץ",
    "ליבי יוסופוב",
    "אריסטרך קפוסטה",
    "שלום מימון",
    "אנדרי אברמוביץ",
    "רוזט פירוזה"
  ],

  // ── קבצים ─────────────────────────────────────────
  // שנה כאן את הנתיבים לפי מבנה השרת שלך
  files: {
    // קובץ Excel עם נתוני מקבלי השירות
    excel: "מחלות רקע.xlsx",

    // לוגו העמותה — קובץ בתיקיית images/ או URL חיצוני
    logoOrg: "https://mnz.org.il/sites/www.mnz.org.il/files/logo-yachdav.png",

    // לוגו משרד הבריאות
    logoMinistry: "https://upload.wikimedia.org/wikipedia/he/thumb/f/fb/Israeli_Ministry_of_Health_logo.png/3840px-Israeli_Ministry_of_Health_logo.png"
  },

  // ── גדלי לוגואים במסמכים ─────────────────────────
  logoSizes: {
    orgHeight:      "50px",
    ministryHeight: "40px"
  }
};

/**
 * פונקציות עזר — נטענות אוטומטית בכל הטפסים
 */

// מילוי שם ארגון בכל מקום עם data-org="name"
function fillOrgNames() {
  document.querySelectorAll('[data-org="name"]').forEach(el => {
    el.textContent = ORG_CONFIG.orgName;
  });
  document.querySelectorAll('[data-org="short"]').forEach(el => {
    el.textContent = ORG_CONFIG.orgShort;
  });
  document.querySelectorAll('[data-org="city"]').forEach(el => {
    el.textContent = ORG_CONFIG.city;
  });
}

// מילוי שם מנהל ועו"ס בכל מקום עם data-staff
function fillStaffNames() {
  document.querySelectorAll('[data-staff="director"]').forEach(el => {
    el.textContent = ORG_CONFIG.director.name;
  });
  document.querySelectorAll('[data-staff="director-full"]').forEach(el => {
    el.textContent = ORG_CONFIG.director.name + ' – ' + ORG_CONFIG.director.title;
  });
  document.querySelectorAll('[data-staff="social-worker"]').forEach(el => {
    el.textContent = ORG_CONFIG.socialWorker.name;
  });
}

// בניית רשימה נפתחת של מדריכים
function buildGuidesSelect(selectEl, includeEmpty = true) {
  if (!selectEl) return;
  selectEl.innerHTML = '';
  if (includeEmpty) {
    const empty = document.createElement('option');
    empty.value = '';
    empty.textContent = 'בחר/י מדריך';
    selectEl.appendChild(empty);
  }
  ORG_CONFIG.guides.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    selectEl.appendChild(opt);
  });
}

// בניית רשימה נפתחת של כל הצוות
function buildAllStaffSelect(selectEl, includeEmpty = true, extraOptions = []) {
  if (!selectEl) return;
  selectEl.innerHTML = '';
  if (includeEmpty) {
    const empty = document.createElement('option');
    empty.value = '';
    empty.textContent = 'בחר...';
    selectEl.appendChild(empty);
  }
  ORG_CONFIG.allStaff.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    selectEl.appendChild(opt);
  });
  extraOptions.forEach(item => {
    const opt = document.createElement('option');
    opt.value = item.value || item;
    opt.textContent = item.label || item;
    selectEl.appendChild(opt);
  });
}

// האתחול מתבצע בתחתית הקובץ

// החלפת לוגואים בכל הטפסים
function fillLogos() {
  // לוגו עמותה
  document.querySelectorAll('[data-logo="org"]').forEach(img => {
    img.src    = ORG_CONFIG.files.logoOrg;
    img.style.height = ORG_CONFIG.logoSizes.orgHeight;
    img.style.width  = 'auto';
    img.style.objectFit = 'contain';
  });
  // לוגו משרד הבריאות
  document.querySelectorAll('[data-logo="ministry"]').forEach(img => {
    img.src    = ORG_CONFIG.files.logoMinistry;
    img.style.height = ORG_CONFIG.logoSizes.ministryHeight;
    img.style.width  = 'auto';
    img.style.objectFit = 'contain';
  });
}

// הוסף fillLogos לאתחול
document.addEventListener('DOMContentLoaded', function() {
  fillOrgNames();
  fillStaffNames();
  fillLogos();
});

</script>
</body>
</html>
